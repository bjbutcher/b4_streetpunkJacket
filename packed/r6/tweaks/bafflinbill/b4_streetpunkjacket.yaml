Items.b4_streetpunkjacket_$(variant):
  $instances:
    - { variant: default }
    - { variant: badapple }
    - { variant: silversamurai }
    - { variant: holypearl }
    - { variant: netwyrm }
    - { variant: sulfuricpsycho }

  $base: Items.GenericOuterChestClothing
  entityName: b4_streetpunkjacket_factory_name
  appearanceName: b4_streetpunkjacket_!$(variant)
  displayName: b4_streetpunkjacket_$(variant)
  localizedDescription: b4_streetpunkjacket_desc
  tags:
    - !append Punk
    - !append Kitsch
  statModifiers:
  - !append Quality.Legendary
  - !append
    $type: ConstantStatModifier
    statType: BaseStats.ItemArmor
    modifierType: Additive
    value: 30.0
  - !append
    $type: ConstantStatModifier
    statType: BaseStats.MitigationChance
    modifierType: Additive
    value: 20.0
  icon:
    atlasResourcePath: output\data\jacket_icons.inkatlas
    atlasPartName: jacket_$(variant)
